<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log7 Capital</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');
  :root{--bg:#0A0A0A;--s1:#111111;--s2:#1A1A1A;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#F0EDE8;--muted:#888580;--gold:#C8A96E;--green:#4CAF7D;--amber:#E8A838;--red:#E05555;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}
  nav{padding:1.1rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,10,10,0.95);backdrop-filter:blur(12px);z-index:100}
  .logo{font-family:'DM Serif Display',serif;font-size:1.15rem;color:var(--gold)}
  .nav-tabs{display:flex;gap:4px}
  .nav-tab{padding:6px 16px;border-radius:6px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all 0.2s}
  .nav-tab:hover{color:var(--text);background:var(--s2)}
  .nav-tab.active{color:var(--gold);background:var(--s2);border:1px solid var(--border2)}
  .container{max-width:1080px;margin:0 auto;padding:2rem}
  .page{display:none}.page.active{display:block}
  .top-bar{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
  .section-title{font-family:'DM Serif Display',serif;font-size:1.5rem;flex:1}
  .btn{padding:9px 22px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all 0.2s}
  .btn-primary{background:var(--gold);color:#0A0A0A}
  .btn-primary:hover{background:#D4B87A}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed}
  .btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}
  .btn-ghost:hover{background:var(--s2)}
  .card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:1.5rem;margin-bottom:1rem}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  @media(max-width:680px){.grid2{grid-template-columns:1fr}}
  label{font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px}
  input,select,textarea{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;outline:none;transition:border 0.2s;appearance:none}
  input:focus,select:focus,textarea:focus{border-color:#8B6F3E}
  textarea{resize:vertical}
  .field{margin-bottom:1.2rem}
  .drop-zone{border:1px dashed rgba(255,255,255,0.15);border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--s1)}
  .drop-zone:hover,.drop-zone.over{border-color:var(--gold);background:rgba(200,169,110,0.04)}
  .drop-zone p{color:var(--muted);font-size:13px}
  .file-ok{color:var(--gold);font-size:13px;margin-top:6px}
  .startup-option{padding:12px 1.25rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
  .startup-option:hover,.startup-option.selected{background:rgba(200,169,110,0.06)}
  .startup-option:last-child{border-bottom:none}
  .co-name{font-size:14px;font-weight:400}
  .co-meta{font-size:12px;color:var(--muted);margin-top:2px}
  .match-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:10px}
  .match-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--s2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--gold);flex-shrink:0}
  .score-num{font-family:'DM Serif Display',serif;font-size:28px;line-height:1}
  .bar-bg{height:3px;background:var(--s2);border-radius:99px;margin:8px 0;overflow:hidden}
  .bar-fill{height:3px;border-radius:99px}
  .verdict{font-size:11px;font-weight:500;padding:3px 9px;border-radius:4px;text-transform:uppercase;letter-spacing:0.06em;display:inline-block;margin-top:3px}
  .v-strong{background:rgba(76,175,125,0.12);color:var(--green)}
  .v-good{background:rgba(200,169,110,0.12);color:var(--gold)}
  .v-weak{background:rgba(232,168,56,0.12);color:var(--amber)}
  .v-poor{background:rgba(224,85,85,0.12);color:var(--red)}
  .tag{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;margin:2px}
  .tag-g{background:rgba(76,175,125,0.1);color:var(--green);border:1px solid rgba(76,175,125,0.2)}
  .tag-a{background:rgba(232,168,56,0.1);color:var(--amber);border:1px solid rgba(232,168,56,0.2)}
  .tags-row{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}
  .inv-row{display:flex;align-items:flex-start;gap:14px;padding:14px 1.25rem;border-bottom:1px solid var(--border)}
  .inv-row:last-child{border-bottom:none}
  .pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin:2px}
  .pill-gold{background:rgba(200,169,110,0.1);color:var(--gold);border:1px solid rgba(200,169,110,0.2)}
  .pill-gray{background:var(--s2);color:var(--muted);border:1px solid var(--border)}
  .empty{text-align:center;padding:3rem;color:var(--muted);font-size:14px}
  .error-box{color:var(--red);font-size:13px;padding:0.75rem 1rem;background:rgba(224,85,85,0.08);border-radius:8px;border:1px solid rgba(224,85,85,0.2);margin-bottom:1rem}
  .loading-box{text-align:center;padding:2rem;color:var(--muted);font-size:14px}
  .count-badge{background:var(--s2);border:1px solid var(--border);border-radius:99px;padding:1px 9px;font-size:12px;color:var(--muted);margin-left:8px}
  .refresh-btn{font-size:12px;color:var(--muted);background:transparent;border:1px solid var(--border);border-radius:6px;padding:5px 12px;cursor:pointer;font-family:'DM Sans',sans-serif}
  .refresh-btn:hover{color:var(--text)}
  .detail-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
  .detail-label{color:var(--muted)}
  .config-bar{background:var(--s1);border:1px solid rgba(200,169,110,0.2);border-radius:8px;padding:12px 16px;margin-bottom:1.5rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .config-bar input{background:transparent;border:none;padding:0;font-size:13px;flex:1;min-width:200px}
  .config-bar input:focus{border:none}
  .config-label{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);white-space:nowrap}
  .key-saved{font-size:11px;color:var(--green)}
</style>
</head>
<body>

<nav>
  <div class="logo">Log7 Capital</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('match',this)">Match</button>
    <button class="nav-tab" onclick="showTab('investors',this)">Investors</button>
    <button class="nav-tab" onclick="showTab('startups',this)">Startups</button>
  </div>
</nav>

<div class="container">

  <!-- API Key Config -->
  <div class="config-bar">
    <span class="config-label">API Key</span>
    <input type="password" id="api-key" placeholder="Paste your Anthropic API key here (sk-ant-...)" oninput="saveKey()">
    <span class="key-saved" id="key-status"></span>
  </div>

  <!-- ERROR / LOADING -->
  <div id="error-box" class="error-box" style="display:none"></div>
  <div id="loading-box" class="loading-box" style="display:none"></div>

  <!-- MATCH PAGE -->
  <div id="page-match" class="page active">
    <div class="top-bar">
      <div class="section-title">Match a Startup</div>
      <button class="refresh-btn" onclick="loadData()">↓ Load from Google Sheets</button>
    </div>
    <div class="grid2">
      <!-- Left col -->
      <div>
        <div class="card" style="padding:0;margin-bottom:1rem">
          <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--border)">
            <label>Select startup</label>
          </div>
          <div id="startup-list-match"><div class="empty">Click "Load from Google Sheets" first</div></div>
        </div>

        <div id="startup-detail" style="display:none" class="card">
          <div id="startup-detail-content"></div>
        </div>

        <!-- PDF Upload -->
        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('pdf-input').click()"
          ondragover="event.preventDefault();this.classList.add('over')"
          ondragleave="this.classList.remove('over')"
          ondrop="handleDrop(event)">
          <p>📎 Drag & drop pitch deck PDF, or click to upload</p>
          <div id="pdf-name" class="file-ok"></div>
          <div id="drive-link-wrap" style="margin-top:8px;font-size:12px;color:var(--muted)"></div>
        </div>
        <input id="pdf-input" type="file" accept=".pdf" style="display:none" onchange="handlePdfSelect(event)">

        <button class="btn btn-primary" id="match-btn" onclick="runMatch()" style="width:100%;margin-top:1rem;padding:12px" disabled>
          Run AI Match
        </button>
      </div>

      <!-- Right col - results -->
      <div id="match-results">
        <div class="empty" style="padding-top:4rem">
          <div style="font-size:2rem;opacity:0.15;margin-bottom:1rem">◈</div>
          Select a startup and run match
        </div>
      </div>
    </div>
  </div>

  <!-- INVESTORS PAGE -->
  <div id="page-investors" class="page">
    <div class="top-bar">
      <div class="section-title">Investors <span class="count-badge" id="inv-count">0</span></div>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh from Sheets</button>
    </div>
    <div class="card" style="padding:0">
      <div id="investor-list"><div class="empty">Load data from Google Sheets</div></div>
    </div>
  </div>

  <!-- STARTUPS PAGE -->
  <div id="page-startups" class="page">
    <div class="top-bar">
      <div class="section-title">Startups <span class="count-badge" id="st-count">0</span></div>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh from Sheets</button>
    </div>
    <div class="card" style="padding:0">
      <div id="startup-list-tab"><div class="empty">Load data from Google Sheets</div></div>
    </div>
  </div>

</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const INVESTOR_URL = 'https://script.google.com/macros/s/AKfycbzyJWMHnorbyJ2svSC315b4TuIznoVDO29bsQxUZ6NSme-bEv0ttG-Af1r-U2uaum6Y/exec';
const STARTUP_URL  = 'https://script.google.com/macros/s/AKfycbzyKugR5RKiuX42Fw_lv_gnidbfMhSWrkyc5LcuFNuwmyZ-ZbblR1r7zRhstTNFBVir/exec';
// ────────────────────────────────────────────────────────

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let investors = [], startups = [], selectedStartup = null, pdfText = '';

// API Key
window.onload = () => {
  const k = localStorage.getItem('l7_key') || '';
  document.getElementById('api-key').value = k;
  if (k) document.getElementById('key-status').textContent = '✓ Saved';
};
function saveKey() {
  const k = document.getElementById('api-key').value;
  localStorage.setItem('l7_key', k);
  document.getElementById('key-status').textContent = k ? '✓ Saved' : '';
}

// Tabs
function showTab(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
}

function initials(n) { return (n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function scoreColor(s) { return s >= 75 ? '#4CAF7D' : s >= 50 ? '#E8A838' : '#E05555'; }
function verdictClass(v) {
  if (v === 'Strong match') return 'v-strong';
  if (v === 'Good match') return 'v-good';
  if (v === 'Weak match') return 'v-weak';
  return 'v-poor';
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg; el.style.display = msg ? 'block' : 'none';
}
function showLoading(msg) {
  const el = document.getElementById('loading-box');
  el.textContent = msg; el.style.display = msg ? 'block' : 'none';
}

// Load data from Google Sheets
async function loadData() {
  showError(''); showLoading('Fetching live data from Google Sheets...');
  try {
    const [invRes, stRes] = await Promise.all([
      fetch(INVESTOR_URL),
      fetch(STARTUP_URL)
    ]);
    const invData = await invRes.json();
    const stData  = await stRes.json();
    if (!invData.success) throw new Error('Investor sheet: ' + invData.error);
    if (!stData.success)  throw new Error('Startup sheet: ' + stData.error);

    investors = invData.data.filter(r => r['Full Name']).map(r => ({
      name:         r['Full Name'] || '',
      phone:        r['WhatsApp Number'] || '',
      email:        r['Email Address'] || '',
      type:         r['Investor Type'] || '',
      ticketSize:   r['Typical Ticket Size'] || '',
      sectors:      r['Sector Preferences'] || '',
      stage:        r['Investment Stage Preference'] || '',
      startupStage: r['Startup Stage Preference'] || '',
      sweetSpot:    r["What's your sweet spot in terms of investment?"] || '',
      thesis:       r['Thesis Notes'] || '',
      hardNos:      r["Hard No's"] || '',
      deploying:    r['Currently Deploying'] || '',
      sendVia:      r['Where should we send you investment opportunities?'] || '',
    }));

    startups = stData.data.filter(r => r['Company Name']).map(r => ({
      company:      r['Company Name'] || '',
      founder:      r["Founder's Name"] || '',
      phone:        r["Founder's Contact No."] || '',
      email:        r['email address'] || '',
      sector:       r['Sector'] || '',
      location:     r['Location'] || '',
      website:      r['Website'] || '',
      valuation:    r['Proposed Valuation'] || '',
      roundSize:    r['Round Size'] || '',
      fundedBefore: r['Have you received funding earlier? If yes, please provide details'] || '',
      problem:      r['What problem are you solving?'] || '',
      currentRound: r['Current Round'] || '',
      arr:          r['ARR(Annual run-rate)'] || '',
      prevRevenue:  r["Previous Month's Revenue"] || '',
      pitchDeckUrl: r['Attach your Pitch Deck (PDF)'] || '',
      stage:        r['What stage is your company in?'] || '',
      timestamp:    r['Timestamp'] || '',
    }));

    document.getElementById('inv-count').textContent = investors.length;
    document.getElementById('st-count').textContent  = startups.length;
    renderInvestors(); renderStartups(); renderStartupMatchList();
    showLoading('');
  } catch(e) {
    showLoading('');
    showError('Failed to load: ' + e.message);
  }
}

// Render investor list
function renderInvestors() {
  const el = document.getElementById('investor-list');
  if (!investors.length) { el.innerHTML = '<div class="empty">No investors loaded</div>'; return; }
  el.innerHTML = investors.map(inv => `
    <div class="inv-row">
      <div class="avatar">${initials(inv.name)}</div>
      <div style="flex:1">
        <div style="font-size:14px">${inv.name}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">${inv.type} · ${inv.ticketSize} · ${inv.phone}</div>
        <div style="margin-top:6px">
          ${(inv.sectors||'').split(',').filter(Boolean).map(s=>`<span class="pill pill-gold">${s.trim()}</span>`).join('')}
          ${(inv.stage||'').split(',').filter(Boolean).map(s=>`<span class="pill pill-gray">${s.trim()}</span>`).join('')}
        </div>
        ${inv.thesis ? `<div style="font-size:12px;color:var(--muted);margin-top:6px;line-height:1.6">${inv.thesis}</div>` : ''}
      </div>
      <span class="pill ${inv.deploying === 'TRUE' || inv.deploying === 'true' ? 'pill-gold' : 'pill-gray'}">${inv.deploying === 'TRUE' || inv.deploying === 'true' ? 'Deploying' : 'Not deploying'}</span>
    </div>
  `).join('');
}

// Render startup list (tab)
function renderStartups() {
  const el = document.getElementById('startup-list-tab');
  if (!startups.length) { el.innerHTML = '<div class="empty">No startups loaded</div>'; return; }
  el.innerHTML = startups.map(s => `
    <div class="inv-row">
      <div class="avatar" style="color:var(--muted)">${initials(s.company)}</div>
      <div style="flex:1">
        <div style="font-size:14px">${s.company}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">${s.founder} · ${s.sector} · ${s.location}</div>
        <div style="margin-top:6px">
          <span class="pill pill-gold">${s.stage}</span>
          ${s.roundSize ? `<span class="pill pill-gray">${s.roundSize}</span>` : ''}
          ${s.arr ? `<span class="pill pill-gray">ARR: ${s.arr}</span>` : ''}
        </div>
        ${s.problem ? `<div style="font-size:12px;color:var(--muted);margin-top:6px;line-height:1.6">${s.problem}</div>` : ''}
      </div>
      ${s.pitchDeckUrl ? `<a href="${s.pitchDeckUrl}" target="_blank" style="color:var(--gold);font-size:12px;text-decoration:none;flex-shrink:0">View deck →</a>` : ''}
    </div>
  `).join('');
}

// Render startup selector on match page
function renderStartupMatchList() {
  const el = document.getElementById('startup-list-match');
  if (!startups.length) { el.innerHTML = '<div class="empty">No startups loaded</div>'; return; }
  el.innerHTML = startups.map((s,i) => `
    <div class="startup-option" onclick="selectStartup(${i})">
      <div class="co-name">${s.company}</div>
      <div class="co-meta">${s.founder} · ${s.sector} · ${s.stage}</div>
    </div>
  `).join('');
}

function selectStartup(i) {
  selectedStartup = startups[i];
  document.querySelectorAll('.startup-option').forEach((el,j) => el.classList.toggle('selected', j===i));
  
  // Show detail card
  const detail = document.getElementById('startup-detail');
  const content = document.getElementById('startup-detail-content');
  detail.style.display = 'block';
  
  const rows = [
    ['Sector', selectedStartup.sector],
    ['Stage', selectedStartup.stage],
    ['Round', selectedStartup.currentRound],
    ['Round Size', selectedStartup.roundSize],
    ['Valuation', selectedStartup.valuation],
    ['ARR', selectedStartup.arr],
    ['Prev Revenue', selectedStartup.prevRevenue],
    ['Funded Before', selectedStartup.fundedBefore],
  ].filter(([,v])=>v);

  content.innerHTML = `
    <div style="font-size:15px;margin-bottom:4px">${selectedStartup.company}</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">${selectedStartup.founder} · ${selectedStartup.location}</div>
    ${rows.map(([k,v])=>`<div class="detail-row"><span class="detail-label">${k}</span><span>${v}</span></div>`).join('')}
    ${selectedStartup.problem ? `<div style="font-size:12px;color:var(--muted);margin-top:10px;line-height:1.6">${selectedStartup.problem}</div>` : ''}
  `;

  // Show drive link if available
  const driveWrap = document.getElementById('drive-link-wrap');
  driveWrap.innerHTML = selectedStartup.pitchDeckUrl
    ? `Or open their submitted deck: <a href="${selectedStartup.pitchDeckUrl}" target="_blank" style="color:var(--gold)">Open in Drive</a>`
    : '';

  document.getElementById('match-btn').disabled = false;
}

// PDF handling
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('over');
  const file = e.dataTransfer.files[0];
  if (file?.type === 'application/pdf') processPdf(file);
}
function handlePdfSelect(e) {
  const file = e.target.files[0];
  if (file) processPdf(file);
}
async function processPdf(file) {
  document.getElementById('pdf-name').textContent = '⏳ Reading PDF...';
  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = '';
    for (let i = 1; i <= Math.min(pdf.numPages, 10); i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(' ') + '\n';
    }
    pdfText = text.slice(0, 4000);
    document.getElementById('pdf-name').textContent = `✓ ${file.name} — ready`;
  } catch(e) {
    document.getElementById('pdf-name').textContent = '⚠ Could not read PDF';
  }
}

// AI Matching
async function runMatch() {
  const apiKey = localStorage.getItem('l7_key');
  if (!apiKey) return showError('Please enter your Anthropic API key at the top');
  if (!selectedStartup) return showError('Select a startup first');
  if (!investors.length) return showError('Load investor data first');

  showError('');
  document.getElementById('match-btn').disabled = true;
  document.getElementById('match-btn').textContent = 'Matching...';
  document.getElementById('match-results').innerHTML = '<div class="loading-box">AI is analysing the startup and scoring all investors...</div>';

  const startupInfo = `
Company: ${selectedStartup.company}
Founder: ${selectedStartup.founder}
Sector: ${selectedStartup.sector}
Location: ${selectedStartup.location}
Stage: ${selectedStartup.stage}
Current Round: ${selectedStartup.currentRound}
Round Size: ${selectedStartup.roundSize}
Valuation: ${selectedStartup.valuation}
ARR: ${selectedStartup.arr}
Previous Month Revenue: ${selectedStartup.prevRevenue}
Funded Before: ${selectedStartup.fundedBefore}
Problem: ${selectedStartup.problem}
${pdfText ? '\nPitch Deck Content:\n' + pdfText : ''}
  `.trim();

  const investorList = investors.map(inv =>
    `- ${inv.name} | ${inv.type} | Ticket: ${inv.ticketSize} | Sectors: ${inv.sectors} | Stage: ${inv.stage} | Startup Stage: ${inv.startupStage} | Thesis: ${inv.thesis} | Hard Nos: ${inv.hardNos} | Deploying: ${inv.deploying}`
  ).join('\n');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: `You are an expert investor matchmaker for Log7 Capital, an invite-only investor network in India.

Startup:
${startupInfo}

Investors:
${investorList}

Score each investor 0-100 for fit with this startup. Consider: sector fit, stage fit, ticket size, thesis, hard nos, whether deploying.

Respond ONLY with valid JSON array, no markdown, no backticks:
[{"name":"...","score":85,"verdict":"Strong match","reasons":["r1","r2"],"concerns":["c1"]}]

Verdict must be one of: Strong match, Good match, Weak match, Poor match. Sort by score descending. Include ALL investors.`
        }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content.map(i => i.text || '').join('');
    const matches = JSON.parse(text.replace(/```json|```/g, '').trim());
    renderMatches(matches);
  } catch(e) {
    showError('Matching failed: ' + e.message);
    document.getElementById('match-results').innerHTML = '';
  }

  document.getElementById('match-btn').disabled = false;
  document.getElementById('match-btn').textContent = 'Run AI Match';
}

function renderMatches(matches) {
  const el = document.getElementById('match-results');
  el.innerHTML = `<div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:1rem">${matches.length} investors ranked</div>` +
    matches.map(m => `
    <div class="match-card">
      <div class="match-header">
        <div class="avatar">${initials(m.name)}</div>
        <div style="flex:1">
          <div style="font-size:15px">${m.name}</div>
          <span class="verdict ${verdictClass(m.verdict)}">${m.verdict}</span>
        </div>
        <div style="text-align:right">
          <div class="score-num" style="color:${scoreColor(m.score)}">${m.score}</div>
          <div style="font-size:11px;color:var(--muted)">/100</div>
        </div>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${m.score}%;background:${scoreColor(m.score)}"></div></div>
      <div class="tags-row">
        ${(m.reasons||[]).map(r=>`<span class="tag tag-g">${r}</span>`).join('')}
        ${(m.concerns||[]).map(c=>`<span class="tag tag-a">${c}</span>`).join('')}
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>

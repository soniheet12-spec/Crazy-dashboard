name: Deploy → log7-capital-pro (NEW project)

on:
  push:
    branches:
      - claude/busy-babbage-bDHke
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI and jq
        run: |
          npm install --global vercel@latest
          sudo apt-get install -y jq

      # ── Step 1: Create or fetch project ID via Vercel REST API ─────
      - name: Create / fetch log7-capital-pro project
        id: project
        run: |
          set -e
          TEAM="${{ secrets.VERCEL_ORG_ID }}"
          TOKEN="${{ secrets.VERCEL_TOKEN }}"

          # Try to create; if it already exists the API returns 409 with the existing project
          RESPONSE=$(curl -sf -X POST \
            "https://api.vercel.com/v9/projects?teamId=${TEAM}" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"log7-capital-pro","framework":null}') || true

          PROJECT_ID=$(echo "$RESPONSE" | jq -r '.id // empty' 2>/dev/null)

          # If empty (project already exists or curl failed), fetch by name
          if [ -z "$PROJECT_ID" ]; then
            echo "Project may already exist — fetching by name..."
            RESPONSE=$(curl -sf \
              "https://api.vercel.com/v9/projects/log7-capital-pro?teamId=${TEAM}" \
              -H "Authorization: Bearer ${TOKEN}")
            PROJECT_ID=$(echo "$RESPONSE" | jq -r '.id')
          fi

          echo "Project ID: $PROJECT_ID"
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"

      # ── Step 2: Write .vercel/project.json ─────────────────────────
      - name: Write .vercel/project.json
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json <<EOF
          {"projectId":"${{ steps.project.outputs.project_id }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}
          EOF
          cat .vercel/project.json

      # ── Step 3: Set environment variables ──────────────────────────
      - name: Set environment variables
        run: |
          add_env() {
            local key="$1" val="$2"
            [[ -z "$val" ]] && return
            printf '%s' "$val" | vercel env add "$key" production \
              --token="${{ secrets.VERCEL_TOKEN }}" \
              --scope="${{ secrets.VERCEL_ORG_ID }}" \
              --force 2>/dev/null || echo "Warning: could not set $key (may already be set)"
          }
          add_env SHEETS_API_URL           "${{ secrets.NEW_SHEETS_API_URL }}"
          add_env UPSTASH_REDIS_REST_URL   "${{ secrets.NEW_UPSTASH_REDIS_REST_URL }}"
          add_env UPSTASH_REDIS_REST_TOKEN "${{ secrets.NEW_UPSTASH_REDIS_REST_TOKEN }}"
          add_env TWILIO_ACCOUNT_SID       "${{ secrets.NEW_TWILIO_ACCOUNT_SID }}"
          add_env TWILIO_AUTH_TOKEN        "${{ secrets.NEW_TWILIO_AUTH_TOKEN }}"
          add_env TWILIO_FROM              "${{ secrets.NEW_TWILIO_FROM }}"
          add_env TWILIO_TO                "${{ secrets.NEW_TWILIO_TO }}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      # ── Step 4: Deploy to production ───────────────────────────────
      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy \
            --prod \
            --yes \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --scope="${{ secrets.VERCEL_ORG_ID }}")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "✅ Deployed to: $URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Print production URL
        run: echo "🚀 New dashboard live at ${{ steps.deploy.outputs.url }}"

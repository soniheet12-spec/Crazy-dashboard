name: Deploy → log7-capital-pro (NEW project)

on:
  push:
    branches:
      - claude/busy-babbage-bDHke
  workflow_dispatch:

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Verify token works — fails loudly if VERCEL_TOKEN is wrong
      - name: Verify Vercel auth
        run: vercel whoami --token="$VERCEL_TOKEN"

      # Create the project (safe to re-run — errors on duplicate are ignored)
      - name: Create project log7-capital-pro
        run: |
          vercel project add log7-capital-pro \
            --token="$VERCEL_TOKEN" \
            --scope="$VERCEL_ORG_ID" 2>&1 || echo "Project may already exist, continuing..."

      # Link the local directory to the new project
      - name: Link to log7-capital-pro
        run: |
          vercel link \
            --project log7-capital-pro \
            --yes \
            --token="$VERCEL_TOKEN" \
            --scope="$VERCEL_ORG_ID"

      # Set all 7 environment variables on the new project
      - name: Set environment variables
        run: |
          add_env() {
            local key="$1" val="$2"
            [[ -z "$val" ]] && return
            printf '%s' "$val" | vercel env add "$key" production \
              --token="$VERCEL_TOKEN" \
              --scope="$VERCEL_ORG_ID" \
              --force 2>/dev/null || echo "Warning: could not set $key"
          }
          add_env SHEETS_API_URL           "${{ secrets.NEW_SHEETS_API_URL }}"
          add_env UPSTASH_REDIS_REST_URL   "${{ secrets.NEW_UPSTASH_REDIS_REST_URL }}"
          add_env UPSTASH_REDIS_REST_TOKEN "${{ secrets.NEW_UPSTASH_REDIS_REST_TOKEN }}"
          add_env TWILIO_ACCOUNT_SID       "${{ secrets.NEW_TWILIO_ACCOUNT_SID }}"
          add_env TWILIO_AUTH_TOKEN        "${{ secrets.NEW_TWILIO_AUTH_TOKEN }}"
          add_env TWILIO_FROM              "${{ secrets.NEW_TWILIO_FROM }}"
          add_env TWILIO_TO                "${{ secrets.NEW_TWILIO_TO }}"

      # Deploy to production
      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy \
            --prod \
            --yes \
            --token="$VERCEL_TOKEN" \
            --scope="$VERCEL_ORG_ID")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "✅ Deployed to: $URL"

      - name: Print production URL
        run: echo "🚀 Dashboard live at ${{ steps.deploy.outputs.url }}"

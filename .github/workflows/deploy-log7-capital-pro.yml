name: Deploy → log7-capital-pro (NEW project)

# Triggers on every push to this feature branch, or manually.
on:
  push:
    branches:
      - claude/busy-babbage-bDHke
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # ── Step 1: Create project if it doesn't exist ────────────────
      # Uses Vercel REST API directly to create the project — avoids
      # interactive prompts from `vercel link` when no projectId exists.
      - name: Create log7-capital-pro project (idempotent)
        run: |
          curl -s -X POST "https://api.vercel.com/v9/projects?teamId=${{ secrets.VERCEL_ORG_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"log7-capital-pro","framework":null}' | tee /tmp/create_project.json
          # Extract projectId (works whether project was just created or already exists)
          PROJECT_ID=$(cat /tmp/create_project.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id') or d.get('error',{}).get('projectId',''))" 2>/dev/null || true)
          if [ -z "$PROJECT_ID" ]; then
            # Project may already exist — fetch it by name
            PROJECT_ID=$(curl -s "https://api.vercel.com/v9/projects/log7-capital-pro?teamId=${{ secrets.VERCEL_ORG_ID }}" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          fi
          echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
          echo "Resolved project ID: $PROJECT_ID"

      # ── Step 2: Write .vercel/project.json with real projectId ─────
      - name: Write .vercel/project.json
        run: |
          mkdir -p .vercel
          echo '{"projectId":"'"$PROJECT_ID"'","orgId":"${{ secrets.VERCEL_ORG_ID }}"}' > .vercel/project.json
          cat .vercel/project.json

      # ── Step 3: Set all 7 environment variables ────────────────────
      - name: Set environment variables
        run: |
          add_env() {
            local key="$1" val="$2"
            [[ -z "$val" ]] && return
            echo "$val" | vercel env add "$key" production \
              --token="${{ secrets.VERCEL_TOKEN }}" \
              --scope="${{ secrets.VERCEL_ORG_ID }}" \
              --force 2>/dev/null || true
          }
          add_env SHEETS_API_URL           "${{ secrets.NEW_SHEETS_API_URL }}"
          add_env UPSTASH_REDIS_REST_URL   "${{ secrets.NEW_UPSTASH_REDIS_REST_URL }}"
          add_env UPSTASH_REDIS_REST_TOKEN "${{ secrets.NEW_UPSTASH_REDIS_REST_TOKEN }}"
          add_env TWILIO_ACCOUNT_SID       "${{ secrets.NEW_TWILIO_ACCOUNT_SID }}"
          add_env TWILIO_AUTH_TOKEN        "${{ secrets.NEW_TWILIO_AUTH_TOKEN }}"
          add_env TWILIO_FROM              "${{ secrets.NEW_TWILIO_FROM }}"
          add_env TWILIO_TO                "${{ secrets.NEW_TWILIO_TO }}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      # ── Step 4: Deploy to production ───────────────────────────────
      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy \
            --prod \
            --yes \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --scope="${{ secrets.VERCEL_ORG_ID }}")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "✅ Deployed to: $URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Print production URL
        run: echo "🚀 New dashboard live at ${{ steps.deploy.outputs.url }}"
